<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cyberattack Timeline Explorer | 1988-2026</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css" />
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>🌍 World Cyberattack Timeline Explorer</h1>
            <p class="subtitle">Interactive timeline of major cyberattacks from 1988 to 2026</p>
        </header>

        <!-- Controls -->
        <div class="controls-section">
            <div class="timeline-slider-wrapper">
                <label for="yearSlider">Filter by Year:</label>
                <input type="range" id="yearSlider" min="1988" max="2026" value="2026" class="timeline-slider">
                <span id="yearDisplay">2026</span>
            </div>
            <div class="filter-controls">
                <input type="text" id="searchInput" placeholder="Search attacks..." class="search-box">
                <select id="typeFilter" class="type-filter">
                    <option value="all">All Attack Types</option>
                    <option value="worm">Worm</option>
                    <option value="ransomware">Ransomware</option>
                    <option value="spyware">Spyware</option>
                    <option value="ddos">DDoS</option>
                    <option value="supply-chain">Supply Chain</option>
                    <option value="phishing">Phishing</option>
                </select>
            </div>
        </div>

        <!-- Main Content Grid -->
        <div class="main-grid">
            <!-- Left Panel: Timeline -->
            <div class="timeline-panel">
                <h2>Timeline</h2>
                <div id="timelineList" class="timeline-list"></div>
            </div>

            <!-- Center: World Map -->
            <div class="map-panel">
                <h2>Affected Regions</h2>
                <div id="map" class="map-container"></div>
            </div>

            <!-- Right Panel: Details -->
            <div class="details-panel">
                <h2>Attack Details</h2>
                <div id="detailsCard" class="hover-card">
                    <p class="placeholder">Hover over an attack to view details</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
    <script src="data/cyberattacks.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
